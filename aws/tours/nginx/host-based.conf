# Host-based routing — APA Orchestration Layer (dev)
#
# FE: https://one-dev.atlanticpartnersasia.com/     → :5137
# BE: https://api.one-dev.atlanticpartnersasia.com/ → :3000
#
# Mount: /etc/nginx/conf.d/host-based.conf
# Test:  nginx -t && nginx -s reload

upstream orch_frontend {
    server 127.0.0.1:5137;
    # Docker Compose network:
    # server frontend:5137;
    keepalive 32;
}

upstream orch_backend {
    server 127.0.0.1:3000;
    # Docker Compose network:
    # server backend:3000;
    keepalive 32;
}

# --- Frontend (apex domain) ---
server {
    listen 80;
    server_name one-dev.atlanticpartnersasia.com;

    # Redirect HTTP → HTTPS (bỏ comment sau khi có SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://orch_frontend;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name one-dev.atlanticpartnersasia.com;

    # ssl_certificate     /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/privkey.pem;

    # Gzip cho static assets (tùy chọn — FE container có thể tự gzip)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        proxy_pass http://orch_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # WebSocket (Vite HMR dev — production thường không cần)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# --- Backend (API subdomain) ---
server {
    listen 80;
    server_name api.one-dev.atlanticpartnersasia.com;
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://orch_backend;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name api.one-dev.atlanticpartnersasia.com;

    # ssl_certificate     /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/privkey.pem;
    # Dùng cert SAN cover cả api.one-dev hoặc cert riêng cho subdomain

    # Tăng timeout cho request dài (export, batch)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://orch_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # WebSocket / SSE
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

