# Path-based routing — APA Orchestration Layer (dev)
#
# Một domain duy nhất:
#   https://one-dev.atlanticpartnersasia.com/      → FE :5137
#   https://one-dev.atlanticpartnersasia.com/api/  → BE :3000
#
# Yêu cầu app:
#   - NestJS: app.setGlobalPrefix('api')
#   - FE:     VITE_API_BASE_URL=/api
#
# Mount: /etc/nginx/conf.d/path-based.conf

upstream orch_frontend {
    server 127.0.0.1:5137;
    # server frontend:5137;
    keepalive 16;
}

upstream orch_backend {
    server 127.0.0.1:3000;
    # server backend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name one-dev.atlanticpartnersasia.com;
    # return 301 https://$host$request_uri;

    include /etc/nginx/snippets/orch-path-locations.conf;
}

server {
    listen 443 ssl http2;
    server_name one-dev.atlanticpartnersasia.com;

    # ssl_certificate     /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/one-dev.atlanticpartnersasia.com/privkey.pem;

    include /etc/nginx/snippets/orch-path-locations.conf;
}

