services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: sql_optimization_demo
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d sql_optimization_demo"]
      interval: 2s
      timeout: 5s
      retries: 10
